<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>freeSpace Regalübersicht</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">freeSpace</p>
          <h1>Regale & freie Plätze</h1>
        </div>
        <div class="auth">
          <span id="userLabel" class="user-label">Nicht angemeldet</span>
          <button id="logoutButton" class="ghost hidden">Logout</button>
        </div>
      </section>

      <section id="setupPanel" class="setup hidden">
        <strong>API-URL fehlt.</strong>
        Trage nach dem Vercel-Deploy in <code>docs/config.js</code> deine Vercel-URL ein.
      </section>

      <section id="message" class="message hidden"></section>

      <section id="loginView" class="login-view">
        <div class="login-box">
          <p class="eyebrow">Login erforderlich</p>
          <h2>Anmelden</h2>
          <p class="login-copy">Danach siehst du die Regalübersicht und kannst Pakete speichern.</p>
          <form id="loginForm">
            <label>
              Benutzername
              <input id="username" name="username" autocomplete="username" required>
            </label>
            <label>
              Passwort
              <input id="password" name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary wide" type="submit">Einloggen</button>
          </form>
        </div>
      </section>

      <section id="appView" class="layout hidden">
        <aside class="panel">
          <div class="panel-head">
            <h2 id="formTitle">Paket hinzufügen</h2>
            <span id="selectedCell">Kein Platz gewählt</span>
          </div>
          <form id="packageForm">
            <input id="packageId" name="packageId" type="hidden">
            <label>
              Ort-Typ
              <select id="locationType" name="locationType">
                <option value="shelf">Regal</option>
                <option value="floor">Bodenplatz</option>
              </select>
            </label>
            <label>
              Ort
              <input id="shelfName" name="shelfName" autocomplete="off" list="placeExamples" placeholder="Regal A" required>
              <datalist id="placeExamples">
                <option value="Regal A"></option>
                <option value="Regal B"></option>
                <option value="Boden - Wareneingang"></option>
                <option value="Boden - Mitte"></option>
                <option value="Boden - Ausgang"></option>
              </datalist>
            </label>
            <div class="split">
              <label>
                Fläche Tiefe (m)
                <input id="shelfRows" name="shelfRows" type="number" min="0.01" max="1000" step="0.01" value="4">
              </label>
              <label>
                Fläche Breite (m)
                <input id="shelfColumns" name="shelfColumns" type="number" min="0.01" max="1000" step="0.01" value="8">
              </label>
            </div>
            <input id="rowIndex" name="rowIndex" type="hidden" value="1">
            <input id="columnIndex" name="columnIndex" type="hidden" value="1">
            <div class="split">
              <label>
                Paket-Breite (m)
                <input id="widthUnits" name="widthUnits" type="number" min="0.01" max="1000" step="0.01" value="1">
              </label>
              <label>
                Paket-Tiefe (m)
                <input id="depthUnits" name="depthUnits" type="number" min="0.01" max="1000" step="0.01" value="1">
              </label>
            </div>
            <label>
              Packung
              <input id="packageName" name="packageName" autocomplete="off" placeholder="Schrauben M4" required>
            </label>
            <div class="split">
              <label>
                Menge
                <input id="quantity" name="quantity" type="number" min="1" value="1">
              </label>
              <label>
                Notiz
                <input id="note" name="note" autocomplete="off" placeholder="optional">
              </label>
            </div>
            <div class="examples">
              <button type="button" data-example="Regal A|shelf|4|8|1|1|1|1|Karton Musterware|1|oben links">Regal-Beispiel</button>
              <button type="button" data-example="Boden - Wareneingang|floor|4|8|2|2|3|2|Palette neu|1|groß, zuerst prüfen">Boden-Beispiel</button>
            </div>
            <button id="saveButton" class="primary wide" type="submit">Speichern</button>
            <button id="cancelEditButton" class="ghost wide hidden" type="button">Bearbeiten abbrechen</button>
          </form>
        </aside>

        <section class="content">
          <div class="toolbar">
            <div>
              <h2>Übersicht</h2>
              <p id="summaryText">Bitte einloggen.</p>
            </div>
            <div class="toolbar-actions">
              <button id="packagesTab" class="tab active" type="button">Pakete</button>
              <button id="placesTab" class="tab" type="button">Orte verwalten</button>
              <button id="refreshButton" class="ghost" type="button">Neu laden</button>
            </div>
          </div>
          <div id="packageView">
            <div id="overviewCards" class="overview-cards"></div>
            <div id="warehouseMap" class="warehouse-map"></div>
            <div id="shelves" class="shelves"></div>
          </div>
          <section id="placeView" class="place-view hidden">
            <form id="placeForm" class="place-form">
              <input id="placeId" name="id" type="hidden">
              <label>
                Typ
                <select id="placeLocationType" name="locationType">
                  <option value="shelf">Regal</option>
                  <option value="floor">Bodenplatz</option>
                </select>
              </label>
              <label>
                Name
                <input id="placeName" name="name" autocomplete="off" placeholder="Boden - Mitte" required>
              </label>
              <div class="split">
                <label>
                  Fläche Tiefe (m)
                  <input id="placeRows" name="rows" type="number" min="0.01" max="1000" step="0.01" value="4">
                </label>
                <label>
                  Fläche Breite (m)
                  <input id="placeColumns" name="columns" type="number" min="0.01" max="1000" step="0.01" value="8">
                </label>
              </div>
              <label>
                Notiz
                <input id="placeNotes" name="notes" autocomplete="off" placeholder="z.B. links neben Eingang">
              </label>
              <div class="place-actions">
                <button id="savePlaceButton" class="primary" type="submit">Ort speichern</button>
                <button id="cancelPlaceButton" class="ghost hidden" type="button">Abbrechen</button>
              </div>
            </form>
            <div id="placeList" class="place-list"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
