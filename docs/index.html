<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>freeSpace Regalübersicht</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">freeSpace</p>
          <h1>Lagerplan</h1>
        </div>
        <div class="auth">
          <span id="userLabel" class="user-label">Nicht angemeldet</span>
          <button id="logoutButton" class="ghost hidden">Logout</button>
        </div>
      </section>

      <section id="setupPanel" class="setup hidden">
        <strong>API-URL fehlt.</strong>
        Trage nach dem Vercel-Deploy in <code>docs/config.js</code> deine Vercel-URL ein.
      </section>

      <section id="message" class="message hidden"></section>

      <section id="loginView" class="login-view">
        <div class="login-box">
          <p class="eyebrow">Zugang</p>
          <h2>Anmelden</h2>
          <p class="login-copy">Melde dich an, um Lagerflächen, Pakete und freie Bereiche zu bearbeiten.</p>
          <form id="loginForm">
            <label>
              Benutzername
              <input id="username" name="username" autocomplete="username" required>
            </label>
            <label>
              Passwort
              <input id="password" name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary wide" type="submit">Einloggen</button>
          </form>
        </div>
      </section>

      <section id="appView" class="layout hidden">
        <aside class="panel">
          <div class="panel-head">
            <h2 id="formTitle">Paket erfassen</h2>
            <span id="selectedCell">Keine Fläche gewählt</span>
          </div>
          <form id="packageForm">
            <input id="packageId" name="packageId" type="hidden">
            <label>
              Ort-Typ
              <select id="locationType" name="locationType">
                <option value="shelf">Regal</option>
                <option value="floor">Bodenplatz</option>
              </select>
            </label>
            <label>
              Ort
              <input id="shelfName" name="shelfName" autocomplete="off" list="placeExamples" placeholder="Regal A" required>
              <datalist id="placeExamples">
                <option value="Regal 600"></option>
                <option value="Bodenfläche 380x180"></option>
                <option value="Bodenfläche 740x70"></option>
              </datalist>
            </label>
            <div class="split">
              <label>
                Fläche Tiefe (cm)
                <input id="shelfRows" name="shelfRows" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" value="245">
              </label>
              <label>
                Fläche Breite (cm)
                <input id="shelfColumns" name="shelfColumns" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" value="600">
              </label>
            </div>
            <input id="rowIndex" name="rowIndex" type="hidden" value="1">
            <input id="columnIndex" name="columnIndex" type="hidden" value="1">
            <div class="split">
              <label>
                Paket-Breite (cm)
                <input id="widthUnits" name="widthUnits" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" value="120">
              </label>
              <label>
                Paket-Tiefe (cm)
                <input id="depthUnits" name="depthUnits" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" value="80">
              </label>
            </div>
            <label>
              Packung
              <input id="packageName" name="packageName" autocomplete="off" placeholder="Schrauben M4" required>
            </label>
            <div class="split">
              <label>
                Menge
                <input id="quantity" name="quantity" type="number" min="1" value="1">
              </label>
              <label>
                Notiz
                <input id="note" name="note" autocomplete="off" placeholder="optional">
              </label>
            </div>
            <div class="examples">
              <button type="button" data-preset="120|80|110|Palette 120x80x110|1">120 x 80</button>
              <button type="button" data-preset="600|80|60|Palette 600x80x60|1">600 x 80</button>
              <button type="button" data-preset="600|80|40|Palette 600x80x40|1">600 x 80 flach</button>
              <button type="button" data-preset="540|35|40|Palette 540x35x40|1">540 x 35</button>
              <button type="button" data-preset="300|35|50|Palette 300x35x50|1">300 x 35</button>
              <button type="button" data-preset="410|35|40|Palette 410x35x40|1">410 x 35</button>
              <button type="button" data-preset="310|35|50|Palette 310x35x50|1">310 x 35</button>
              <button type="button" data-preset="340|45|45|Palette 340x45x45|4|gestapelt">4x 340 x 45</button>
              <button type="button" data-preset="270|45|45|Palette 270x45x45|1">270 x 45</button>
              <button type="button" data-preset="800|35|45|Palette 800x35x45|1">800 x 35</button>
              <button type="button" data-preset="310|80|35|Palette 310x80x35|1">310 x 80</button>
              <button type="button" data-preset="410|80|35|Palette 410x80x35|1">410 x 80</button>
              <button type="button" data-preset="80|70|0|Sperrfläche rot|1|nicht abstellen">Sperrfläche</button>
            </div>
            <div class="package-actions">
              <button id="saveButton" class="primary" type="submit">Paket speichern</button>
              <button id="deletePackageButton" class="danger hidden" type="button">Löschen</button>
            </div>
            <button id="cancelEditButton" class="ghost wide hidden" type="button">Bearbeiten abbrechen</button>
          </form>
        </aside>

        <section class="content">
          <div class="toolbar">
            <div>
              <h2>Flächenübersicht</h2>
              <p id="summaryText">Bitte einloggen.</p>
            </div>
            <div class="toolbar-actions">
              <button id="packagesTab" class="tab active" type="button">Pakete</button>
              <button id="placesTab" class="tab" type="button">Orte verwalten</button>
              <button id="refreshButton" class="ghost" type="button">Neu laden</button>
            </div>
          </div>
          <div id="packageView">
            <div id="overviewCards" class="overview-cards"></div>
            <div id="warehouseMap" class="warehouse-map"></div>
            <div id="shelves" class="shelves"></div>
          </div>
          <section id="placeView" class="place-view hidden">
            <form id="placeForm" class="place-form">
              <input id="placeId" name="id" type="hidden">
              <label>
                Typ
                <select id="placeLocationType" name="locationType">
                  <option value="shelf">Regal</option>
                  <option value="floor">Bodenplatz</option>
                </select>
              </label>
              <label>
                Name
                <input id="placeName" name="name" autocomplete="off" placeholder="Boden - Mitte" required>
              </label>
              <div class="split">
                <label>
                  Fläche Tiefe (cm)
                  <input id="placeRows" name="rows" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" value="245">
                </label>
                <label>
                  Fläche Breite (cm)
                  <input id="placeColumns" name="columns" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" value="600">
                </label>
              </div>
              <div class="examples">
                <button type="button" data-place-preset="Regal 600|shelf|245|600|4 Felder à 150 cm">Regal 600 x 245</button>
                <button type="button" data-place-preset="Bodenfläche 380x180|floor|180|380|rote Ecke frei halten">Boden 380 x 180</button>
                <button type="button" data-place-preset="Bodenfläche 740x70|floor|70|740|lange Bodenfläche">Boden 740 x 70</button>
              </div>
              <label>
                Notiz
                <input id="placeNotes" name="notes" autocomplete="off" placeholder="z.B. links neben Eingang">
              </label>
              <div class="place-actions">
                <button id="savePlaceButton" class="primary" type="submit">Ort speichern</button>
                <button id="cancelPlaceButton" class="ghost hidden" type="button">Abbrechen</button>
                <button id="deleteAllPlacesButton" class="danger" type="button">Alle Flächen löschen</button>
              </div>
            </form>
            <div id="placeList" class="place-list"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
