<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>freeSpace Storage Layout</title>
    <link rel="stylesheet" href="./styles.css?v=20260714-full-rack-3d">
</head>

<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">freeSpace</p>
        <h1>Storage Layout</h1>
      </div>
      <div class="auth">
        <span id="userLabel" class="user-label">Not signed in</span>
        <button id="logoutButton" class="ghost hidden">Logout</button>
      </div>
    </section>

    <section id="setupPanel" class="setup hidden">
      <strong>API URL is missing.</strong>
      After deploying to Vercel, add your Vercel URL in <code>docs/config.js</code>.
    </section>

    <section id="message" class="message hidden"></section>

    <section id="loginView" class="login-view">
      <div class="login-box">
        <p class="eyebrow">Access</p>
        <h2>Sign in</h2>
        <p class="login-copy">Sign in to manage storage areas, items, and available space.</p>
        <form id="loginForm">
          <label>
            Username
            <input id="username" name="username" autocomplete="username" required>
          </label>
          <label>
            Password
            <input id="password" name="password" type="password" autocomplete="current-password" required>
          </label>
          <button class="primary wide" type="submit">Sign in</button>
        </form>
      </div>
    </section>

    <section id="appView" class="layout hidden">
      <aside class="panel">
        <div class="panel-head">
          <h2 id="formTitle">Add item</h2>
          <span id="selectedCell">No area selected</span>
        </div>
        <form id="packageForm">
          <input id="packageId" name="packageId" type="hidden">
          <label class="hidden">
            Area type
            <select id="locationType" name="locationType">
              <option value="shelf">Rack</option>
              <option value="floor">Floor area</option>
            </select>
          </label>
          <label class="hidden">
            Area
            <input id="shelfName" name="shelfName" autocomplete="off" list="placeExamples" placeholder="Rack area 1"
              required>
            <datalist id="placeExamples">
              <option value="Rack 600 x 90"></option>
              <option value="Floor area 1 - 880 x 380"></option>
              <option value="Floor area 2 - 380 x 740"></option>
            </datalist>
          </label>
          <div class="split">
            <label>
              Area depth (cm)
              <input id="shelfRows" name="shelfRows" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" step="0.1"
                value="450">
            </label>
            <label>
              Area width (cm)
              <input id="shelfColumns" name="shelfColumns" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" step="0.1"
                value="600">
            </label>
          </div>
          <input id="rowIndex" name="rowIndex" type="hidden" value="1">
          <input id="columnIndex" name="columnIndex" type="hidden" value="1">
          <div class="split">
            <label>
              Item width (cm)
              <input id="widthUnits" name="widthUnits" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" step="0.1"
                value="120">
            </label>
            <label>
              Item depth (cm)
              <input id="depthUnits" name="depthUnits" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" step="0.1"
                value="80">
            </label>
          </div>
          <label>
            Pack height (cm)
            <input id="heightUnits" name="heightUnits" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" step="0.1"
              value="45">
          </label>
          <label>
            Item
            <input id="packageName" name="packageName" autocomplete="off" placeholder="M4 screws" required>
          </label>
          <div class="split">
            <label>
              Stack count
              <input id="quantity" name="quantity" type="number" min="1" value="1">
            </label>
            <label>
              Note
              <input id="note" name="note" autocomplete="off" placeholder="optional">
            </label>
          </div>
          <div class="examples">
            <button type="button" data-preset="120|80|110|Pallet 120x80x110|1">120 x 80</button>
            <button type="button" data-preset="600|80|60|Pallet 600x80x60|1">600 x 80</button>
            <button type="button" data-preset="600|80|40|Pallet 600x80x40|1">600 x 80 low</button>
            <button type="button" data-preset="540|75|40|Pallet 540x75x40|1">540 x 75</button>
            <button type="button" data-preset="300|35|50|Pallet 300x35x50|1">300 x 35</button>
            <button type="button" data-preset="410|35|40|Pallet 410x35x40|1">410 x 35</button>
            <button type="button" data-preset="310|35|50|Pallet 310x35x50|1">310 x 35</button>
            <button type="button" data-preset="340|45|45|Pallet 340x45x45|4|stacked">4x 340 x 45</button>
            <button type="button" data-preset="270|45|45|Pallet 270x45x45|1">270 x 45</button>
            <button type="button" data-preset="800|35|45|Pallet 800x35x45|1">800 x 35</button>
            <button type="button" data-preset="310|80|35|Pallet 310x80x35|1">310 x 80</button>
            <button type="button" data-preset="410|80|35|Pallet 410x80x35|1">410 x 80</button>
            <button type="button" data-zone-kind="red">Red no-place zone</button>
            <button type="button" data-zone-kind="yellow">Yellow reserve zone</button>
          </div>
          <div class="package-actions">
            <button id="saveButton" class="primary" type="submit">Save item</button>
            <button id="deletePackageButton" class="danger hidden" type="button">Delete</button>
          </div>
          <button id="cancelEditButton" class="ghost wide hidden" type="button">Cancel editing</button>
        </form>
      </aside>

      <section class="content">
        <div class="toolbar">
          <div>
            <h2>Area overview</h2>
            <p id="summaryText">Please sign in.</p>
          </div>
          <div class="toolbar-actions">
            <button id="view3dButton" class="ghost" type="button">3D view</button>
            <button id="refreshButton" class="ghost" type="button">Reload</button>
            <button id="resetPlanButton" class="danger" type="button">Delete all</button>
          </div>
        </div>
        <div id="packageView">
          <div id="overviewCards" class="overview-cards"></div>
          <div id="warehouseMap" class="warehouse-map"></div>
          <div id="model3d" class="model3d hidden"></div>
          <div id="shelves" class="shelves"></div>
        </div>
        <section id="placeView" class="place-view hidden">
          <div class="place-view-head">
            <div>
              <span class="place-type">Manage areas</span>
              <h2>Edit area</h2>
            </div>
            <button id="backToOverviewButton" class="ghost" type="button">← Back to overview</button>
          </div>
            <form id="placeForm" class="place-form">
              <input id="placeId" name="id" type="hidden">
              <input id="placeParentId" name="parentId" type="hidden">
            <label>
              Type
              <select id="placeLocationType" name="locationType">
                <option value="shelf">Rack</option>
                <option value="floor">Floor area</option>
              </select>
            </label>
            <label>
              Name
              <input id="placeName" name="name" autocomplete="off" placeholder="Floor area 1 - 880 x 380" required>
            </label>
            <div class="split">
              <label>
                Area depth (cm)
                <input id="placeRows" name="rows" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" step="0.1"
                  value="450">
              </label>
              <label>
                Area width (cm)
                <input id="placeColumns" name="columns" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" step="0.1"
                  value="600">
              </label>
            </div>
            <div class="examples">
              <button type="button"
                data-place-preset="Rack 600 x 90|shelf|450|600|4 levels, each 600 x 90 cm; max height 220 cm">Rack 600 x
                90</button>
              <button type="button" data-place-preset="Floor area 1 - 880 x 380|floor|380|880|Max height 220 cm">Floor
                880 x 380</button>
              <button type="button" data-place-preset="Floor area 2 - 380 x 740|floor|740|380|Max height 220 cm">Floor
                380 x 740</button>
            </div>
            <label>
              Note
              <input id="placeNotes" name="notes" autocomplete="off" placeholder="e.g. left of the entrance">
            </label>
            <div class="place-actions">
              <button id="savePlaceButton" class="primary" type="submit">Save area</button>
              <button id="cancelPlaceButton" class="ghost hidden" type="button">Cancel</button>
              <button id="deleteAllPlacesButton" class="danger" type="button">Delete all areas</button>
            </div>
          </form>
          <div id="placeList" class="place-list"></div>
        </section>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="./config.js"></script>
    <script src="./app.js?v=20260714-full-rack-3d"></script>
</body>

</html>
